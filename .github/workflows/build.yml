name: build

# Cross-platform installers for ImageQueue.
# Triggers: pushing a version tag (v*) produces release builds; "Run workflow"
# (workflow_dispatch) builds on demand. No automatic builds on ordinary pushes.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# A newer run for the same ref cancels an in-progress one.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs exactly from package-lock.json. The darwin-only postinstall
      # (spawn-helper perms) no-ops on Windows.
      - name: Install dependencies
        run: npm ci

      # electron-vite -> out/
      - name: Build renderer/main/preload
        run: npm run build

      # Package with electron-builder. node-pty is N-API + prebuilt, so
      # npmRebuild is off (set in electron-builder.yml) — no native toolchain
      # needed. On macOS, CSC_IDENTITY_AUTO_DISCOVERY=false makes electron-builder
      # fall back to an ad-hoc signature (no Developer ID cert available).
      # --publish never: build artifacts only, never push a GitHub Release.
      - name: Package ${{ matrix.platform }}
        run: npx --no-install electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: imagequeue-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*-mac.zip
            dist/*-win.zip
            dist/*.blockmap
            dist/latest*.yml
